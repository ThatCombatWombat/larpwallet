<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LarpWallet"/>
  <meta name="theme-color" content="#0a0a1a"/>
  <title>LarpWallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; width: 100%;
      background: #0a0a1a;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* Safe area insets for notch phones */
    .app {
      height: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      max-width: 430px; margin: 0 auto;
      position: relative; overflow: hidden;
      background: #0a0a1a;
    }

    /* Status bar */
    .status-bar {
      padding: env(safe-area-inset-top, 12px) 24px 0;
      padding-top: max(env(safe-area-inset-top), 12px);
      display: flex; justify-content: space-between; align-items: center;
      background: #0a0a1a; z-index: 10;
      min-height: 44px;
    }
    .status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; font-size: 13px; }

    /* Scrollable content */
    .scroll-area {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* Header */
    .header {
      padding: 12px 24px 0;
      background: #0a0a1a;
    }
    .wallet-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .wallet-name-wrap { display: flex; align-items: center; gap: 8px; }
    .wallet-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; flex-shrink: 0; }
    .wallet-name-text { font-size: 14px; color: #9999bb; font-weight: 500; }
    .wallet-badge { background: #7c3aed22; border: 1px solid #7c3aed55; border-radius: 20px; padding: 2px 9px; font-size: 10px; color: #c4b5fd; font-weight: 500; letter-spacing: 0.5px; }
    .wallet-addr { font-size: 11px; color: #44445a; font-family: 'DM Mono', monospace; margin-bottom: 0; }

    /* Balance */
    .balance-section { text-align: center; padding: 24px 24px 16px; }
    .balance-label { font-size: 11px; color: #666688; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .balance-amount { font-size: 48px; font-weight: 600; letter-spacing: -2px; line-height: 1; color: #fff; }
    .balance-change { font-size: 13px; color: #22c55e; margin-top: 8px; }

    /* Mini chart */
    .chart-wrap { padding: 0 20px 4px; }
    .mini-chart { width: 100%; height: 56px; display: block; }

    /* Actions */
    .action-row { display: flex; gap: 8px; justify-content: center; padding: 12px 24px 16px; }
    .action-btn { display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; border: none; background: none; color: #fff; flex: 1; max-width: 80px; padding: 0; }
    .action-icon { width: 52px; height: 52px; border-radius: 50%; background: #ffffff12; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: background 0.15s, transform 0.1s; border: 1px solid #ffffff0a; }
    .action-btn:active .action-icon { background: #ffffff20; transform: scale(0.93); }
    .action-label { font-size: 12px; color: #8888aa; font-weight: 500; }

    /* Divider */
    .section-divider { height: 8px; background: #06060f; }

    /* Tabs */
    .tabs { display: flex; padding: 0 20px; border-bottom: 1px solid #1e1e30; background: #0a0a1a; }
    .tab { padding: 14px 16px; font-size: 13px; font-weight: 500; color: #555577; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #fff; border-bottom-color: #7c3aed; }

    /* Token list */
    .section-header { font-size: 11px; color: #555577; letter-spacing: 1px; text-transform: uppercase; padding: 16px 24px 8px; background: #0a0a1a; }
    .token-list { background: #0a0a1a; padding: 0 12px 4px; }
    .token-row { display: flex; align-items: center; gap: 14px; padding: 13px 12px; border-radius: 18px; cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
    .token-row:active { background: #ffffff08; }
    .token-row.selected { background: #7c3aed14; border-color: #7c3aed44; }
    .token-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; font-weight: 600; }
    .token-info { flex: 1; min-width: 0; }
    .token-name { font-size: 15px; font-weight: 500; color: #fff; }
    .token-sub { font-size: 12px; color: #8888aa; margin-top: 2px; }
    .token-right { text-align: right; }
    .token-value { font-size: 15px; font-weight: 500; color: #fff; }
    .token-chg { font-size: 12px; margin-top: 2px; }
    .pos { color: #22c55e; } .neg { color: #ef4444; }
    .token-edit-hint { font-size: 10px; color: #555577; margin-top: 1px; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #0d0d1eee; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid #1e1e30;
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px 0; padding-bottom: max(env(safe-area-inset-bottom), 10px);
      z-index: 50;
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; border: none; background: none; color: #555577; padding: 4px 16px; }
    .nav-btn.active { color: #7c3aed; }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

    /* Edit panel */
    .overlay { position: fixed; inset: 0; background: #000000aa; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.visible { opacity: 1; pointer-events: all; }
    .edit-panel {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px;
      background: #111128; border-top: 1px solid #2a2a44;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px;
      padding-bottom: max(env(safe-area-inset-bottom, 24px), 24px);
      z-index: 101;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .edit-panel.open { transform: translateX(-50%) translateY(0); }
    .edit-handle { width: 40px; height: 4px; background: #333355; border-radius: 2px; margin: 0 auto 18px; }
    .edit-panel-title { font-size: 12px; color: #7777aa; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px; }
    .edit-token-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .edit-tok-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .edit-tok-name { font-size: 18px; font-weight: 600; }
    .edit-tok-price { font-size: 12px; color: #8888aa; margin-top: 2px; }
    .quick-amounts { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-btn { padding: 7px 13px; background: #1a1a30; border: 1px solid #2a2a44; border-radius: 22px; color: #aaaacc; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .quick-btn:active { background: #7c3aed28; border-color: #7c3aed77; color: #c4b5fd; transform: scale(0.96); }
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-prefix { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8888aa; font-size: 22px; font-weight: 500; pointer-events: none; }
    .amount-input {
      width: 100%; padding: 16px 16px 16px 36px;
      background: #0a0a1a; border: 1.5px solid #2a2a44;
      border-radius: 16px; color: #fff; font-size: 26px;
      font-weight: 600; outline: none; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    .amount-input:focus { border-color: #7c3aed; }
    .token-equiv { font-size: 13px; color: #8888aa; text-align: center; margin-bottom: 14px; min-height: 20px; }
    .save-btn {
      width: 100%; padding: 16px;
      background: #7c3aed; border: none; border-radius: 16px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px;
    }
    .save-btn:active { background: #6d28d9; transform: scale(0.98); }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #7c3aed; color: #fff;
      padding: 11px 24px; border-radius: 40px; font-size: 14px; font-weight: 500;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200;
      white-space: nowrap; box-shadow: 0 8px 32px #7c3aed44;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Empty state hint */
    .empty-hint { text-align: center; padding: 32px 24px; color: #444466; font-size: 13px; line-height: 1.6; }
    .empty-hint strong { color: #666688; display: block; margin-bottom: 6px; font-size: 15px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-time" id="status-time">9:41</div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#fff" opacity="0.4"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#fff" opacity="0.6"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#fff"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="#fff"/></svg>
      <svg width="16" height="12" viewBox="0 0 20 15" fill="none"><path d="M10 3C7.2 3 4.7 4.1 2.9 5.9L1.4 4.4C3.6 2.2 6.6 0.8 10 0.8s6.4 1.4 8.6 3.6L17.1 5.9C15.3 4.1 12.8 3 10 3Z" fill="#fff"/><path d="M10 7.5c-1.7 0-3.2.7-4.3 1.8L4.2 7.8C5.7 6.3 7.7 5.3 10 5.3s4.3 1 5.8 2.5l-1.5 1.5C13.2 8.2 11.7 7.5 10 7.5Z" fill="#fff"/><circle cx="10" cy="13" r="2" fill="#fff"/></svg>
      <span style="font-size:12px;font-weight:600;">100%</span>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#fff" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="2" fill="#fff"/><path d="M23 4.5v3a1.5 1.5 0 000-3z" fill="#fff" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area">

    <div class="header">
      <div class="wallet-row">
        <div class="wallet-name-wrap">
          <div class="wallet-dot"></div>
          <div class="wallet-name-text">My Wallet</div>
        </div>
        <div class="wallet-badge">LARP</div>
      </div>
      <div class="wallet-addr">0x7f4a2c9e...d3a9</div>
    </div>

    <div class="balance-section">
      <div class="balance-label">Total Balance</div>
      <div class="balance-amount" id="total-balance">$0.00</div>
      <div class="balance-change" id="total-change">Tap a token below to set your balance</div>
    </div>

    <div class="chart-wrap">
      <svg class="mini-chart" viewBox="0 0 390 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path id="chart-fill" d="" fill="url(#cg)"/>
        <path id="chart-line" d="" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="action-row">
      <button class="action-btn" onclick="toast('Receive')">
        <div class="action-icon">↓</div>
        <span class="action-label">Receive</span>
      </button>
      <button class="action-btn" onclick="toast('Send')">
        <div class="action-icon">↑</div>
        <span class="action-label">Send</span>
      </button>
      <button class="action-btn" onclick="toast('Swap')">
        <div class="action-icon">⇄</div>
        <span class="action-label">Swap</span>
      </button>
      <button class="action-btn" onclick="toast('Buy')">
        <div class="action-icon">+</div>
        <span class="action-label">Buy</span>
      </button>
    </div>

    <div class="section-divider"></div>

    <div class="tabs">
      <div class="tab active">Tokens</div>
      <div class="tab">NFTs</div>
      <div class="tab">Activity</div>
    </div>

    <div class="section-header">Your assets · tap to edit</div>
    <div class="token-list" id="token-list"></div>

    <div class="empty-hint" id="empty-hint">
      <strong>Your wallet is empty</strong>
      Tap any token above to set your balance.<br/>This is for larping purposes only 😎
    </div>

  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active"><div class="nav-icon">⬡</div><div class="nav-label">Wallet</div></button>
    <button class="nav-btn" onclick="toast('Swap')"><div class="nav-icon">⇄</div><div class="nav-label">Swap</div></button>
    <button class="nav-btn" onclick="toast('Explore')"><div class="nav-icon">◎</div><div class="nav-label">Explore</div></button>
    <button class="nav-btn" onclick="toast('Settings')"><div class="nav-icon">⚙</div><div class="nav-label">Settings</div></button>
  </div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Edit panel -->
<div class="edit-panel" id="edit-panel">
  <div class="edit-handle"></div>
  <div class="edit-panel-title">Edit Balance</div>
  <div class="edit-token-hdr">
    <div class="edit-tok-icon" id="edit-icon"></div>
    <div>
      <div class="edit-tok-name" id="edit-tok-name"></div>
      <div class="edit-tok-price" id="edit-tok-price"></div>
    </div>
  </div>
  <div class="quick-amounts" id="quick-amounts"></div>
  <div class="input-wrap">
    <span class="input-prefix">$</span>
    <input class="amount-input" type="number" id="amount-input" inputmode="decimal" placeholder="0.00" min="0" step="0.01"/>
  </div>
  <div class="token-equiv" id="token-equiv"></div>
  <button class="save-btn" onclick="saveBalance()">Update Balance</button>
</div>

<!-- Toast -->
<div class="toast" id="toast-el"></div>

<script>
  const tokens = [
    { id:'btc',  name:'Bitcoin',   sym:'BTC',  icon:'₿', bg:'#f7931a22', col:'#f7931a', price:67420,  change:+2.34  },
    { id:'eth',  name:'Ethereum',  sym:'ETH',  icon:'Ξ', bg:'#627eea22', col:'#627eea', price:3510,   change:-1.12  },
    { id:'sol',  name:'Solana',    sym:'SOL',  icon:'◎', bg:'#9945ff22', col:'#9945ff', price:178.5,  change:+5.67  },
    { id:'bnb',  name:'BNB',       sym:'BNB',  icon:'B', bg:'#f3ba2f22', col:'#f3ba2f', price:608,    change:+0.88  },
    { id:'usdc', name:'USD Coin',  sym:'USDC', icon:'$', bg:'#2775ca22', col:'#2775ca', price:1.000,  change:+0.01  },
    { id:'xrp',  name:'XRP',       sym:'XRP',  icon:'✕', bg:'#0ecdd622', col:'#0ecdd6', price:0.5812, change:+3.21  },
    { id:'ada',  name:'Cardano',   sym:'ADA',  icon:'₳', bg:'#0033ad22', col:'#4dabf7', price:0.4421, change:-0.55  },
    { id:'doge', name:'Dogecoin',  sym:'DOGE', icon:'Ð', bg:'#c2a63322', col:'#c2a633', price:0.1632, change:+8.44  },
  ];

  const bals = {};
  tokens.forEach(t => bals[t.id] = 0);

  let selectedId = null;
  let toastTimer = null;

  function fmtUSD(n) {
    if (n === 0) return '$0.00';
    if (n >= 1e9) return '$' + (n/1e9).toFixed(3) + 'B';
    if (n >= 1e6) return '$' + (n/1e6).toFixed(3) + 'M';
    if (n >= 1000) return '$' + n.toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2});
    return '$' + n.toFixed(2);
  }

  function fmtToken(usd, price) {
    if (usd === 0) return '0';
    const amt = usd / price;
    if (amt >= 1e6) return amt.toLocaleString('en', {maximumFractionDigits:0});
    if (amt >= 1000) return amt.toLocaleString('en', {maximumFractionDigits:2});
    if (amt >= 1) return amt.toFixed(4);
    return amt.toFixed(6);
  }

  function totalUSD() { return tokens.reduce((s,t) => s + bals[t.id], 0); }

  function updateTotal() {
    const tot = totalUSD();
    document.getElementById('total-balance').textContent = fmtUSD(tot);
    if (tot === 0) {
      document.getElementById('total-change').textContent = 'Tap a token below to set your balance';
      document.getElementById('total-change').style.color = '#555577';
    } else {
      const chg = tot * 0.0312;
      document.getElementById('total-change').textContent = '+' + fmtUSD(chg) + ' (+3.12%) today';
      document.getElementById('total-change').style.color = '#22c55e';
    }
    drawChart(tot);
    document.getElementById('empty-hint').style.display = tot === 0 ? 'block' : 'none';
  }

  function drawChart(total) {
    const pts = [0.70,0.74,0.71,0.79,0.76,0.83,0.80,0.87,0.84,0.91,0.88,0.94,0.91,0.97,0.94,1.0];
    const W=390, H=56, pad=3;
    const vals = pts.map(p => p * Math.max(total, 1));
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const rng = mx - mn || 1;
    const coords = pts.map((p,i) => {
      const x = (i/(pts.length-1))*(W-pad*2)+pad;
      const y = H-pad-((vals[i]-mn)/rng)*(H-pad*2-6)+3;
      return [x.toFixed(1), y.toFixed(1)];
    });
    const lineD = coords.map((c,i) => (i?'L':'M')+c[0]+' '+c[1]).join(' ');
    const fillD = lineD + ` L${W-pad} ${H+2} L${pad} ${H+2} Z`;
    document.getElementById('chart-line').setAttribute('d', lineD);
    document.getElementById('chart-fill').setAttribute('d', fillD);
  }

  function renderList() {
    const list = document.getElementById('token-list');
    list.innerHTML = tokens.map(t => {
      const bal = bals[t.id];
      const sign = t.change >= 0 ? '+' : '';
      const cls = t.change >= 0 ? 'pos' : 'neg';
      const tokenStr = fmtToken(bal, t.price) + ' ' + t.sym;
      const sel = selectedId === t.id ? 'selected' : '';
      return `<div class="token-row ${sel}" onclick="selectToken('${t.id}')">
        <div class="token-icon" style="background:${t.bg};color:${t.col}">${t.icon}</div>
        <div class="token-info">
          <div class="token-name">${t.name}</div>
          <div class="token-sub">${tokenStr}</div>
        </div>
        <div class="token-right">
          <div class="token-value">${fmtUSD(bal)}</div>
          <div class="token-chg ${cls}">${sign}${t.change.toFixed(2)}%</div>
        </div>
      </div>`;
    }).join('');
  }

  function selectToken(id) {
    selectedId = id;
    const t = tokens.find(x => x.id === id);
    document.getElementById('edit-icon').textContent = t.icon;
    document.getElementById('edit-icon').style.background = t.bg;
    document.getElementById('edit-icon').style.color = t.col;
    document.getElementById('edit-tok-name').textContent = t.name + ' (' + t.sym + ')';
    document.getElementById('edit-tok-price').textContent = 'Price: ' + fmtUSD(t.price) + ' per ' + t.sym;

    const quickVals = [1000, 10000, 100000, 1000000, 1000000000];
    const quickLabels = ['$1K', '$10K', '$100K', '$1M', '$1B'];
    document.getElementById('quick-amounts').innerHTML = quickLabels.map((q,i) =>
      `<button class="quick-btn" onclick="setQuick(${quickVals[i]})">${q}</button>`
    ).join('');

    const cur = bals[id];
    const inp = document.getElementById('amount-input');
    inp.value = cur > 0 ? cur.toFixed(2) : '';
    updateEquiv(cur, t);
    renderList();

    document.getElementById('overlay').classList.add('visible');
    document.getElementById('edit-panel').classList.add('open');
    setTimeout(() => inp.focus(), 400);
  }

  function updateEquiv(usdVal, t) {
    const el = document.getElementById('token-equiv');
    if (!t) t = tokens.find(x => x.id === selectedId);
    if (!t || usdVal <= 0) { el.textContent = ''; return; }
    el.textContent = '≈ ' + fmtToken(usdVal, t.price) + ' ' + t.sym;
  }

  document.getElementById('amount-input').addEventListener('input', function() {
    const val = parseFloat(this.value) || 0;
    updateEquiv(val, null);
  });

  function setQuick(val) {
    document.getElementById('amount-input').value = val.toFixed(2);
    const t = tokens.find(x => x.id === selectedId);
    updateEquiv(val, t);
  }

  function saveBalance() {
    if (!selectedId) return;
    const val = parseFloat(document.getElementById('amount-input').value) || 0;
    bals[selectedId] = val;
    closePanel();
    renderList();
    updateTotal();
    toast('Balance updated!');
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('edit-panel').classList.remove('open');
    selectedId = null;
    renderList();
  }

  document.getElementById('amount-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveBalance();
    if (e.key === 'Escape') closePanel();
  });

  function toast(msg) {
    const el = document.getElementById('toast-el');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // Live clock
  function updateTime() {
    const now = new Date();
    const h = now.getHours() % 12 || 12;
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('status-time').textContent = h + ':' + m;
  }
  updateTime();
  setInterval(updateTime, 10000);

  // Tabs (decorative)
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  renderList();
  updateTotal();
</script>
</body>
</html>
